syntax = "proto3";

option csharp_namespace = "Echo";

package echo;

message EchoRequest {
  string message = 1;
}

message EchoResponse {
  string message = 1;
}

// Echo service used by SharedMemory feature examples.
service Echo {
  // Unary echo — sends a single message and receives a single response.
  rpc UnaryEcho(EchoRequest) returns (EchoResponse);

  // Bidirectional streaming echo — sends and receives a stream of messages.
  rpc BidirectionalStreamingEcho(stream EchoRequest) returns (stream EchoResponse);
}
