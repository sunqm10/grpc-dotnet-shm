syntax = "proto3";

package grpc.testing;

option csharp_namespace = "Grpc.Testing";

// Payload configuration
message Payload {
  // Type of payload
  PayloadType type = 1;
  // Primary contents of payload
  bytes body = 2;
}

enum PayloadType {
  // Compressable text format
  COMPRESSABLE = 0;
}

// Request for UnaryCall or StreamingCall
message SimpleRequest {
  // Desired payload type in the response
  PayloadType response_type = 1;
  // Desired payload size in the response
  int32 response_size = 2;
  // Optional input payload sent along with the request
  Payload payload = 3;
}

// Response for UnaryCall or StreamingCall
message SimpleResponse {
  // Payload to increase message size
  Payload payload = 1;
}

// The benchmark service
service BenchmarkService {
  // One request followed by one response
  rpc UnaryCall(SimpleRequest) returns (SimpleResponse);
  
  // One request followed by one response in a streaming fashion
  // Used for ping-pong style streaming benchmarks
  rpc StreamingCall(stream SimpleRequest) returns (stream SimpleResponse);
}
